image: Ubuntu2204

stack: jdk 17

branches:
  only:
    - main

build: off

# Кэширование зависимостей Maven (ускоряет сборку)
cache:
  - ~/.m2/repository -> pom.xml

before_build:
  - mvn -v
  # Удаляем маркеры неудачных загрузок, чтобы Maven не пропускал артефакты
  - find ~/.m2/repository -name "*.lastUpdated" -delete

build_script:
  # Основная команда сборки с параметрами для стабильной загрузки зависимостей
  - mvn clean package -DskipTests -U -B -Dmaven.resolver.transport=wagon -Dmaven.wagon.http.retryHandler.count=3

test_script:
  # Запуск тестов с аналогичными сетевыми настройками для надёжности
  - mvn verify -U -B -Dmaven.resolver.transport=wagon -Dmaven.wagon.http.retryHandler.count=3
